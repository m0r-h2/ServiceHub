services:
  app:
    build:
      context: .
    # Ждем 10 секунд и запускаем через uv run
    command: >
      sh -c "sleep 10 && 
      uv run uvicorn backend.app.main:app 
      --host 0.0.0.0 
      --port 8000"
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${SERVICE__HUB__DB__USERNAME}
      POSTGRES_PASSWORD: ${SERVICE__HUB__DB__PASSWORD}
      POSTGRES_DB: ${SERVICE__HUB__DB__NAME}
    ports:
      - "${SERVICE__HUB__DB__PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: